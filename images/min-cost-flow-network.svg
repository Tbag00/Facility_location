<svg viewBox="0 0 900 480" xmlns="http://www.w3.org/2000/svg" font-family="Georgia, 'Times New Roman', serif">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#2b2b2b"/>
    </marker>
  </defs>

  <rect x="0" y="0" width="900" height="480" fill="#ffffff"/>

  <text x="450" y="34" text-anchor="middle" font-size="20" fill="#1a1a1a">Grafo di trasporto per il sottoproblema (x fissato)</text>
  <text x="450" y="56" text-anchor="middle" font-size="13" fill="#555555" font-style="italic">min-cost flow: le y_ij ottime emergono come flusso sugli archi sede &#8594; cliente</text>

  <!-- S node -->
  <circle cx="90" cy="250" r="26" fill="#ffffff" stroke="#1a1a1a" stroke-width="2"/>
  <text x="90" y="256" text-anchor="middle" font-size="18" fill="#1a1a1a">S</text>

  <!-- Facility nodes (only open ones, x_i = 1) -->
  <circle cx="330" cy="140" r="26" fill="#eaf2ff" stroke="#2255aa" stroke-width="2"/>
  <text x="330" y="146" text-anchor="middle" font-size="15" fill="#2255aa">A</text>

  <circle cx="330" cy="360" r="26" fill="#eaf2ff" stroke="#2255aa" stroke-width="2"/>
  <text x="330" y="366" text-anchor="middle" font-size="15" fill="#2255aa">B</text>

  <!-- Customer nodes -->
  <circle cx="600" cy="110" r="26" fill="#fff2e6" stroke="#cc6600" stroke-width="2"/>
  <text x="600" y="116" text-anchor="middle" font-size="15" fill="#cc6600">1</text>

  <circle cx="600" cy="250" r="26" fill="#fff2e6" stroke="#cc6600" stroke-width="2"/>
  <text x="600" y="256" text-anchor="middle" font-size="15" fill="#cc6600">2</text>

  <circle cx="600" cy="390" r="26" fill="#fff2e6" stroke="#cc6600" stroke-width="2"/>
  <text x="600" y="396" text-anchor="middle" font-size="15" fill="#cc6600">3</text>

  <!-- T node -->
  <circle cx="820" cy="250" r="26" fill="#ffffff" stroke="#1a1a1a" stroke-width="2"/>
  <text x="820" y="256" text-anchor="middle" font-size="18" fill="#1a1a1a">T</text>

  <!-- S -> facilities (capacity u_i, cost 0) -->
  <line x1="112" y1="235" x2="308" y2="155" stroke="#1a1a1a" stroke-width="1.6" marker-end="url(#arrow)"/>
  <text x="185" y="178" font-size="12.5" fill="#333333">cap = u&#8321;, costo 0</text>

  <line x1="112" y1="265" x2="308" y2="345" stroke="#1a1a1a" stroke-width="1.6" marker-end="url(#arrow)"/>
  <text x="185" y="330" font-size="12.5" fill="#333333">cap = u&#8322;, costo 0</text>

  <!-- facilities -> customers (capacity inf, cost c_ij) -->
  <line x1="352" y1="128" x2="578" y2="113" stroke="#666666" stroke-width="1.3" marker-end="url(#arrow)"/>
  <text x="440" y="105" font-size="12" fill="#555555">c&#8321;&#8321;</text>

  <line x1="352" y1="150" x2="578" y2="240" stroke="#666666" stroke-width="1.3" marker-end="url(#arrow)"/>
  <text x="440" y="175" font-size="12" fill="#555555">c&#8321;&#8322;</text>

  <line x1="352" y1="160" x2="578" y2="382" stroke="#666666" stroke-width="1.3" marker-end="url(#arrow)"/>
  <text x="420" y="260" font-size="12" fill="#555555">c&#8321;&#8323;</text>

  <line x1="352" y1="350" x2="578" y2="120" stroke="#666666" stroke-width="1.3" marker-end="url(#arrow)"/>
  <text x="420" y="230" font-size="12" fill="#555555">c&#8322;&#8321;</text>

  <line x1="352" y1="350" x2="578" y2="258" stroke="#666666" stroke-width="1.3" marker-end="url(#arrow)"/>
  <text x="440" y="325" font-size="12" fill="#555555">c&#8322;&#8322;</text>

  <line x1="352" y1="368" x2="578" y2="388" stroke="#666666" stroke-width="1.3" marker-end="url(#arrow)"/>
  <text x="440" y="395" font-size="12" fill="#555555">c&#8322;&#8323;</text>

  <!-- customers -> T (capacity d_j, cost 0) -->
  <line x1="626" y1="122" x2="798" y2="238" stroke="#1a1a1a" stroke-width="1.6" marker-end="url(#arrow)"/>
  <text x="700" y="165" font-size="12.5" fill="#333333">cap = d&#8321;, costo 0</text>

  <line x1="626" y1="250" x2="794" y2="250" stroke="#1a1a1a" stroke-width="1.6" marker-end="url(#arrow)"/>
  <text x="675" y="240" font-size="12.5" fill="#333333">cap = d&#8322;, costo 0</text>

  <line x1="626" y1="378" x2="798" y2="262" stroke="#1a1a1a" stroke-width="1.6" marker-end="url(#arrow)"/>
  <text x="700" y="345" font-size="12.5" fill="#333333">cap = d&#8323;, costo 0</text>

  <!-- legend -->
  <rect x="40" y="420" width="820" height="46" fill="#f7f7f7" stroke="#dddddd"/>
  <text x="56" y="440" font-size="12.5" fill="#333333">Sedi mostrate: solo quelle aperte (x&#8305; = 1). Il flusso ottimo S&#8594;T (costo minimo) coincide con le y&#8305;&#8271; ottime del sottoproblema.</text>
  <text x="56" y="458" font-size="12.5" fill="#333333">Flusso totale richiesto F = &#931;&#8320; d&#8271; . Se non &#232; possibile spingere F unit&#224;, x &#232; infeasible (capacit&#224; insufficiente).</text>
</svg>
